<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercury ACH Sender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
  <h1>Mercury ACH</h1>
  <span id="account-badge">Loading...</span>
</header>

<div class="container">
  <!-- Stepper -->
  <div class="stepper">
    <div class="step-item active" id="step1-indicator">
      <div class="step-circle">1</div>
      <div class="step-label">Recipient</div>
    </div>
    <div class="step-line" id="step-line"></div>
    <div class="step-item" id="step2-indicator">
      <div class="step-circle">2</div>
      <div class="step-label">Payment</div>
    </div>
  </div>

  <!-- Step 1: Recipient -->
  <div class="card" id="step1">
    <h2>Select Recipient</h2>

    <div class="toggle-group">
      <button class="toggle-btn active" id="toggle-existing" onclick="toggleMode('existing')">Existing</button>
      <button class="toggle-btn" id="toggle-new" onclick="toggleMode('new')">New Recipient</button>
    </div>

    <div id="alert-area"></div>

    <!-- Existing Recipients -->
    <div id="existing-panel">
      <div class="loading-recipients" id="recipients-loading">Loading recipients...</div>
      <div class="recipient-list hidden" id="recipients-list"></div>
      <div class="empty-state hidden" id="recipients-empty">No recipients found. Create a new one.</div>
    </div>

    <!-- New Recipient Form -->
    <div id="new-panel" class="hidden">
      <div class="section-label">Contact</div>
      <label for="r-name">Recipient Name</label>
      <input type="text" id="r-name" placeholder="Acme Corp">

      <label for="r-email">Email</label>
      <input type="email" id="r-email" placeholder="billing@acme.com">

      <hr>
      <div class="section-label">Bank Details</div>

      <label for="r-routing">Routing Number</label>
      <input type="text" id="r-routing" placeholder="021000021" maxlength="9">

      <label for="r-account">Account Number</label>
      <input type="text" id="r-account" placeholder="123456789">

      <label for="r-type">Account Type</label>
      <select id="r-type">
        <option value="businessChecking">Business Checking</option>
        <option value="businessSavings">Business Savings</option>
        <option value="personalChecking">Personal Checking</option>
        <option value="personalSavings">Personal Savings</option>
      </select>

      <hr>
      <div class="section-label">Address</div>

      <label for="r-address">Street Address</label>
      <input type="text" id="r-address" placeholder="123 Main St">

      <div class="row">
        <div>
          <label for="r-city">City</label>
          <input type="text" id="r-city" placeholder="San Francisco">
        </div>
        <div>
          <label for="r-state">State</label>
          <input type="text" id="r-state" placeholder="CA" maxlength="2">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="r-zip">Zip Code</label>
          <input type="text" id="r-zip" placeholder="94105" maxlength="10">
        </div>
        <div>
          <label for="r-country">Country</label>
          <input type="text" id="r-country" value="US" placeholder="US">
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-next" onclick="goToStep2()" disabled>Next</button>
  </div>

  <!-- Step 2: Payment -->
  <div class="card hidden" id="step2">
    <h2>Send Payment</h2>

    <div id="alert-area-2"></div>

    <div class="recipient-item selected" id="selected-recipient" style="cursor:default; margin-bottom: 20px;">
      <div>
        <div class="name" id="sel-name"></div>
        <div class="detail" id="sel-detail"></div>
      </div>
    </div>

    <label for="p-amount">Amount (USD)</label>
    <input type="number" id="p-amount" placeholder="0.00" min="0.01" step="0.01">

    <label for="p-category">Category</label>
    <select id="p-category">
      <option value="contractor" selected>Contractor</option>
      <option value="">— None —</option>
      <option value="transferToMyExternalAccount">Transfer to My Account</option>
      <option value="employee">Employee</option>
      <option value="vendor">Vendor</option>
      <option value="landlord">Landlord</option>
      <option value="forGoodsOrServices">Goods or Services</option>
      <option value="subsidiary">Subsidiary</option>
      <option value="familyMemberOrFriend">Family / Friend</option>
      <option value="angelInvestment">Angel Investment</option>
      <option value="savingsOrInvestments">Savings / Investments</option>
      <option value="expenses">Expenses</option>
      <option value="travel">Travel</option>
      <option value="other">Other</option>
    </select>

    <div id="category-info-wrap">
      <label for="p-category-info">Additional Info</label>
      <input type="text" id="p-category-info" placeholder="e.g. vendor name, description">
    </div>

    <label for="p-memo">Memo (optional)</label>
    <input type="text" id="p-memo" placeholder="Invoice #1234">

    <button class="btn btn-primary" id="btn-send" onclick="sendPayment()">Send ACH Payment</button>
    <button class="btn btn-secondary" onclick="backToStep1()">Back</button>
  </div>

  <!-- Step 3: Confirmation -->
  <div class="card hidden" id="step3">
    <div class="confirmation" id="confirmation-content"></div>
    <button class="btn btn-primary" onclick="reset()" style="margin-top: 20px;">Send Another Payment</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
